name: PR Checks

on:
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  pr-smoke:
    name: PR Smoke Check
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build App
        run: |
          xcodebuild clean build \
            -scheme "AppPorts" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO

  data-directory-advisory:
    name: Data Directory Tests (Advisory)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Run Data Directory Tests
        id: data_dir_tests
        continue-on-error: true
        run: |
          xcodebuild test \
            -scheme "AppPorts" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -only-testing:"AppPortsTests/DataDirMoverTests" \
            -only-testing:"AppPortsTests/DataDirScannerTests" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Publish Advisory Summary
        if: always()
        run: |
          if [ "${{ steps.data_dir_tests.outcome }}" = "failure" ]; then
            echo "Data directory advisory tests failed. Review this check before merge." >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Data directory advisory tests failed. Review this check before merge."
          else
            echo "Data directory advisory tests passed." >> "$GITHUB_STEP_SUMMARY"
          fi

  localization-audit-advisory:
    name: Localization Audit (Advisory)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Run Localization Audit
        id: localization_audit
        continue-on-error: true
        run: |
          xcodebuild test \
            -scheme "AppPorts" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -only-testing:"AppPortsTests/LocalizationAuditTests" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Publish Advisory Summary
        if: always()
        run: |
          if [ "${{ steps.localization_audit.outcome }}" = "failure" ]; then
            echo "Localization audit failed. Review this check before merge." >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Localization audit failed. Review this check before merge."
          else
            echo "Localization audit passed." >> "$GITHUB_STEP_SUMMARY"
          fi

name: Build AppPorts

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  pr-smoke:
    if: github.event_name == 'pull_request'
    name: PR Smoke Check
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build App
        run: |
          xcodebuild clean build \
            -scheme "AppPorts" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Data Directory Tests (Advisory)
        continue-on-error: true
        run: |
          xcodebuild test \
            -scheme "AppPorts" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -only-testing:"AppPortsTests/DataDirMoverTests" \
            -only-testing:"AppPortsTests/DataDirScannerTests" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Localization Audit (Advisory)
        continue-on-error: true
        run: |
          xcodebuild test \
            -scheme "AppPorts" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -only-testing:"AppPortsTests/LocalizationAuditTests" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO

  post-merge-validation:
    if: github.event_name == 'push'
    name: Post-merge Validation
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Run Data Directory Tests
        run: |
          xcodebuild test \
            -scheme "AppPorts" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -only-testing:"AppPortsTests/DataDirMoverTests" \
            -only-testing:"AppPortsTests/DataDirScannerTests" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Localization Audit (Advisory)
        continue-on-error: true
        run: |
          xcodebuild test \
            -scheme "AppPorts" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -only-testing:"AppPortsTests/LocalizationAuditTests" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build App
        run: |
          # Build the app using xcodebuild
          # We use -derivedDataPath to easily locate the output
          xcodebuild clean build \
            -scheme "AppPorts" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip Application
        run: |
          cd build/Build/Products/Release
          # Zip the .app bundle to preserve permissions and symlinks
          zip -r ../../../../AppPorts.zip AppPorts.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppPorts-Unsigned
          path: AppPorts.zip
          retention-days: 5
